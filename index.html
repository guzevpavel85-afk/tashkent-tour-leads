<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0f1420">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Турбаза">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Турфирмы Узбекистана — база</title>
<style>
  :root{--bg:#0f1420;--card:#1a2233;--acc:#38bdf8;--acc2:#22d3ee;--txt:#e5edf5;--mut:#8aa0b6;--ag:#34d399;--op:#fbbf24;--fav:#fbbf24}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{position:sticky;top:0;background:linear-gradient(180deg,#0f1420,#0f1420ee);backdrop-filter:blur(8px);padding:12px 14px 8px;border-bottom:1px solid #ffffff14;z-index:10}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:8px}
  h1{margin:0 0 2px;font-size:18px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:8px}
  #exp{padding:7px 11px;border-radius:10px;border:1px solid #ffffff22;background:#141c2b;color:var(--acc2);font-size:12px;cursor:pointer;white-space:nowrap}
  #q{width:100%;padding:11px 14px;border-radius:12px;border:1px solid #ffffff22;background:#0b101a;color:var(--txt);font-size:15px}
  .tabs{display:flex;gap:6px;margin-top:8px}
  .tab{flex:1;padding:8px;border-radius:10px;border:1px solid #ffffff1a;background:#141c2b;color:var(--mut);font-size:13px;text-align:center;cursor:pointer}
  .tab.on{background:var(--acc);color:#02121d;font-weight:700;border-color:var(--acc)}
  .geo{display:flex;gap:6px;margin-top:8px}
  select{flex:1;min-width:0;padding:9px 10px;border-radius:10px;border:1px solid #ffffff22;background:#0b101a;color:var(--txt);font-size:13px}
  .chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .chip{padding:6px 11px;border-radius:20px;border:1px solid #ffffff1a;background:#141c2b;color:var(--mut);font-size:12px;cursor:pointer;user-select:none}
  .chip.on{background:var(--acc2);color:#02121d;font-weight:700;border-color:var(--acc2)}
  #list{padding:10px 12px 40px;max-width:680px;margin:0 auto}
  .card{background:var(--card);border:1px solid #ffffff12;border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .card:active{transform:scale(.99)}
  .card.is-called{opacity:.62}
  .nm{font-weight:600;font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card.is-fav .nm::before{content:'★';color:var(--fav)}
  .card.is-called .nm::after{content:'✓ обзвонено';font-size:10px;color:var(--ag);font-weight:700}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
  .b-ag{background:#34d39922;color:var(--ag)}
  .b-op{background:#fbbf2422;color:var(--op)}
  .b-ig{background:#e1306c22;color:#f472b6}
  .b-yr{background:#38bdf822;color:var(--acc2)}
  .row{color:var(--mut);font-size:13px;margin-top:3px;display:flex;gap:7px;align-items:flex-start}
  .row a{color:var(--acc2);text-decoration:none}
  .snip{color:#b9c8d6;font-size:12.5px;line-height:1.45;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .desc-full{color:#cdd9e5;font-size:13px;line-height:1.5;margin:2px 0 10px;white-space:pre-line}
  .desc-ttl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
  .det{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #ffffff14}
  .card.open .det{display:block}
  .det a.btn,.det span.btn{display:inline-block;margin:4px 6px 0 0;padding:7px 12px;border-radius:10px;background:#0b101a;border:1px solid #ffffff22;color:var(--acc2);font-size:13px;text-decoration:none;cursor:pointer}
  .call{background:var(--ag)!important;color:#02160f!important;border-color:var(--ag)!important;font-weight:700}
  .cp{color:var(--mut)!important}
  .tgb{color:#38bdf8!important}
  .crm{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
  .crmb{background:#0b101a;border:1px solid #ffffff22;color:var(--mut);padding:7px 12px;border-radius:10px;font-size:13px;cursor:pointer}
  .crmb.on{background:var(--acc2);color:#02121d;font-weight:700;border-color:var(--acc2)}
  .crmb.fav.on{background:var(--fav);border-color:var(--fav)}
  .note{display:block;width:100%;margin-top:8px;padding:8px 10px;border-radius:10px;border:1px solid #ffffff22;background:#0b101a;color:var(--txt);font-size:13px;font-family:inherit;resize:vertical;min-height:38px}
  .empty{color:var(--mut);text-align:center;padding:40px}
  .count{color:var(--mut);font-size:12px;padding:4px 2px 10px}
  #gate{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
  .gate-box{width:100%;max-width:340px;text-align:center}
  .gate-ico{font-size:44px;margin-bottom:10px}
  .gate-ttl{font-size:19px;font-weight:700;margin-bottom:4px}
  .gate-sub{color:var(--mut);font-size:13px;margin-bottom:22px}
  #gpw{width:100%;padding:13px 15px;border-radius:12px;border:1px solid #ffffff22;background:#0b101a;color:var(--txt);font-size:16px;text-align:center}
  #geye{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:1px solid #ffffff22;background:#141c2b;color:var(--acc2);font-size:14px;cursor:pointer}
  #gbtn{width:100%;margin-top:12px;padding:13px;border-radius:12px;border:none;background:var(--acc);color:#02121d;font-size:15px;font-weight:700;cursor:pointer}
  #gbtn:disabled{opacity:.6}
  .gate-err{color:#f87171;font-size:13px;min-height:18px;margin-top:12px}
</style>
</head>
<body>
<div id="gate" style="display:none">
  <div class="gate-box">
    <div class="gate-ico">🔒</div>

    <div class="gate-sub">База защищена паролем</div>
    <input id="gpw" type="password" placeholder="Введите пароль" autocomplete="current-password">
    <button id="geye" type="button">👁 Показать пароль</button>
    <button id="gbtn">Войти</button>
    <div id="gerr" class="gate-err"></div>
  </div>
</div>

const geoUrl=x=>x.lat&&x.lon?'https://www.google.com/maps?q='+x.lat+','+x.lon:(x.a?mapUrl(x.a):'');
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const score=x=>(x.ig?2:0)+(x.tg?1:0)+x.soc.length+(x.w?1:0);

// --- CRM: отметки хранятся в браузере (localStorage) ---
let CRM={};try{CRM=JSON.parse(localStorage.getItem('crm-tb')||'{}');}catch(e){}
const getCrm=id=>CRM[id]||{};
function setCrm(id,patch){CRM[id]=Object.assign({},CRM[id],patch);try{localStorage.setItem('crm-tb',JSON.stringify(CRM));}catch(e){}}
function toggleCalled(id,btn){const v=!getCrm(id).called;setCrm(id,{called:v});btn.classList.toggle('on',v);btn.closest('.card').classList.toggle('is-called',v);}
function toggleFav(id,btn){const v=!getCrm(id).fav;setCrm(id,{fav:v});btn.classList.toggle('on',v);btn.closest('.card').classList.toggle('is-fav',v);}
function saveNote(id,v){setCrm(id,{note:v});}
function copyPhone(t,el){if(navigator.clipboard)navigator.clipboard.writeText(t);const o=el.textContent;el.textContent='✓';setTimeout(()=>{el.textContent=o;},900);}

function tally(items,key){const m={};items.forEach(x=>{const v=x[key];if(v)m[v]=(m[v]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function fillCity(){
  const opts=[['all','Все города ('+DATA.length+')']].concat(tally(DATA,'c').map(([c,n])=>[c,c+' ('+n+')']));
  citySel.innerHTML=opts.map(([v,l])=>'<option value="'+esc(v)+'">'+esc(l)+'</option>').join('');
}
function fillDistrict(){
  const inCity=DATA.filter(x=>x.c==='Ташкент');
  const opts=[['all','Все районы ('+inCity.length+')']].concat(tally(inCity,'d').map(([d,n])=>[d,d+' ('+n+')']));
  distSel.innerHTML=opts.map(([v,l])=>'<option value="'+esc(v)+'">'+esc(l)+'</option>').join('');
}
function fillYear(){
  const years=tally(DATA,'yr').sort((a,b)=>b[0]-a[0]);
  const noYear=DATA.filter(x=>!x.yr).length;
  const opts=[['all','Все годы']].concat(years.map(([y,n])=>[y,'📅 '+y+' ('+n+')']));
  if(noYear)opts.push(['none','Год не указан ('+noYear+')']);
  yearSel.innerHTML=opts.map(([v,l])=>'<option value="'+esc(v)+'">'+esc(l)+'</option>').join('');
}

function passes(x){
  if(state.filter!=='all'&&x.t!==state.filter)return false;
  if(state.city!=='all'&&x.c!==state.city)return false;
  if(state.city==='Ташкент'&&state.district!=='all'&&x.d!==state.district)return false;
  if(state.year==='none'&&x.yr)return false;
  if(state.year!=='all'&&state.year!=='none'&&x.yr!==state.year)return false;
  if(state.ig&&!x.ig)return false;
  if(state.desc&&!x.desc)return false;
  if(state.email&&!x.em)return false;
  if(state.web&&!x.w)return false;
  if(state.fav&&!getCrm(x.id).fav)return false;
  if(state.hidecalled&&getCrm(x.id).called)return false;
  const t=state.term.toLowerCase();
  if(t&&!(x.n+' '+x.a+' '+x.p.join(' ')+' '+x.desc).toLowerCase().includes(t))return false;
  return true;
}
function render(){
  let rows=DATA.filter(passes);
  if(state.sort)rows=rows.slice().sort((a,b)=>score(b)-score(a)||a.n.localeCompare(b.n,'ru'));
  lastRows=rows;
  list.innerHTML='<div class="count">Найдено: '+rows.length+' из '+DATA.length+'</div>'+
    (rows.length?rows.map(card).join(''):'<div class="empty">Ничего не найдено</div>');
}
function card(x){
  const c=getCrm(x.id);
  const cls='card'+(c.called?' is-called':'')+(c.fav?' is-fav':'');
  const badge=x.t==='турагент'?'<span class="badge b-ag">агент</span>':'<span class="badge b-op">оператор</span>';
  const igb=x.ig?'<span class="badge b-ig">IG</span>':'';
  const yrb=x.yr?'<span class="badge b-yr">📅 '+esc(x.yr)+'</span>':'';
  const phone1=x.p[0]?'<div class="row">📞 <a href="tel:'+x.p[0].replace(/[^0-9+]/g,'')+'">'+esc(x.p[0])+'</a></div>':'';
  const addr=x.a?'<div class="row">📍 '+esc(x.a)+'</div>':'';
  const snip=x.desc?'<div class="snip">'+esc(x.desc)+'</div>':'';
  let det='<div class="det">';
  if(x.desc)det+='<div class="desc-ttl">Чем занимается</div><div class="desc-full">'+esc(x.desc)+'</div>';
  x.p.forEach(p=>{const tel=p.replace(/[^0-9+]/g,'');
    det+='<a class="btn call" href="tel:'+tel+'" onclick="event.stopPropagation()">📞 '+esc(p)+'</a>'+
         '<span class="btn cp" onclick="event.stopPropagation();copyPhone(\''+tel+'\',this)" title="Копировать">⧉</span>';});
  det+='<div style="margin-top:6px">';
  const mu=geoUrl(x);
  if(mu)det+='<a class="btn" target="_blank" onclick="event.stopPropagation()" href="'+esc(mu)+'">🗺 На карте</a>';
  if(x.em)det+='<a class="btn" onclick="event.stopPropagation()" href="mailto:'+esc(x.em)+'">📧 '+esc(x.em)+'</a>';
  if(x.w)det+='<a class="btn" target="_blank" onclick="event.stopPropagation()" href="'+esc(x.w)+'">🌐 Сайт</a>';
  if(x.ig)det+='<a class="btn" target="_blank" onclick="event.stopPropagation()" href="'+esc(x.ig)+'">📷 Instagram</a>';
  if(x.tg)det+='<a class="btn tgb" target="_blank" onclick="event.stopPropagation()" href="'+esc(x.tg)+'">✈ Telegram</a>';
  x.soc.forEach(s=>{const u=s.split(':').slice(1).join(':');det+='<a class="btn" target="_blank" onclick="event.stopPropagation()" href="'+esc(u)+'">'+esc(s.split(':')[0])+'</a>';});
  det+='</div>';
  det+='<div class="crm">'+
    '<span class="crmb'+(c.called?' on':'')+'" onclick="event.stopPropagation();toggleCalled(\''+x.id+'\',this)">📞 Обзвонено</span>'+
    '<span class="crmb fav'+(c.fav?' on':'')+'" onclick="event.stopPropagation();toggleFav(\''+x.id+'\',this)">★ Избранное</span>'+
    '</div>';
  det+='<textarea class="note" placeholder="Заметка по фирме…" onclick="event.stopPropagation()" oninput="saveNote(\''+x.id+'\',this.value)">'+esc(c.note||'')+'</textarea>';
  det+='</div>';
  return '<div class="'+cls+'" onclick="this.classList.toggle(\'open\')"><div class="nm">'+esc(x.n)+' '+badge+' '+igb+' '+yrb+'</div>'+phone1+addr+snip+det+'</div>';
}

function exportCsv(){
  const H=['Название','Тип','Год','Город','Район','Адрес','Телефоны','Email','Сайт','Instagram','Telegram','Описание','Статус','Заметка'];
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[H.join(';')];
  lastRows.forEach(x=>{const c=getCrm(x.id);
    const st=[c.called?'обзвонено':'',c.fav?'избранное':''].filter(Boolean).join('+');
    lines.push([x.n,x.t,x.yr,x.c,x.d,x.a,x.p.join(' | '),x.em,x.w,x.ig,x.tg,x.desc,st,c.note||''].map(q).join(';'));});
  const blob=new Blob(['\ufeff'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='turbaza_'+lastRows.length+'.csv';document.body.appendChild(a);a.click();
  a.remove();URL.revokeObjectURL(url);
}

document.getElementById('q').addEventListener('input',e=>{state.term=e.target.value;render();});
document.getElementById('exp').addEventListener('click',exportCsv);
citySel.addEventListener('change',e=>{
  state.city=e.target.value;state.district='all';
  if(state.city==='Ташкент'){fillDistrict();distSel.style.display='';}else distSel.style.display='none';
  render();
});
distSel.addEventListener('change',e=>{state.district=e.target.value;render();});
yearSel.addEventListener('change',e=>{state.year=e.target.value;render();});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');state.filter=t.dataset.f;render();
});
document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
  ch.classList.toggle('on');state[ch.dataset.c]=ch.classList.contains('on');render();
});

function boot(){fillCity();fillYear();render();}
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.d));
  DATA=JSON.parse(new TextDecoder().decode(pt));
}
if(ENC.enc){
  const gate=document.getElementById('gate');gate.style.display='flex';
  const inp=document.getElementById('gpw'),btn=document.getElementById('gbtn'),err=document.getElementById('gerr');
  const tryUnlock=async()=>{
    if(!inp.value)return;
    err.textContent='';btn.disabled=true;btn.textContent='Проверяю…';
    try{await unlock(inp.value);gate.style.display='none';boot();}
    catch(e){err.textContent='Неверный пароль';btn.disabled=false;btn.textContent='Войти';inp.select();}
  };
  btn.onclick=tryUnlock;
  const eye=document.getElementById('geye');
  eye.onclick=()=>{const show=inp.type==='password';inp.type=show?'text':'password';eye.textContent=show?'🙈 Скрыть пароль':'👁 Показать пароль';inp.focus();};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
  setTimeout(()=>inp.focus(),100);
}else{boot();}
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
