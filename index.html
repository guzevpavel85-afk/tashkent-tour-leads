  const addr=x.a?'<div class="row">📍 '+esc(x.a)+'</div>':'';
  let det='<div class="det">';
  x.p.forEach(p=>{det+='<a class="btn call" href="tel:'+p.replace(/[^0-9+]/g,'')+'">📞 '+esc(p)+'</a>';});
  if(x.a)det+='<div style="margin-top:8px"><a class="btn" target="_blank" href="'+mapUrl(x.a)+'">🗺 На карте</a>';
  if(x.w)det+='<a class="btn" target="_blank" href="'+esc(x.w)+'">🌐 Сайт</a>';
  if(x.ig)det+='<a class="btn" target="_blank" href="'+esc(x.ig)+'">📷 Instagram</a>';
  x.soc.forEach(s=>{const u=s.split(':').slice(1).join(':');det+='<a class="btn" target="_blank" href="'+esc(u)+'">'+esc(s.split(':')[0])+'</a>';});
  det+='</div></div>';
  return '<div class="card" onclick="this.classList.toggle(\'open\')"><div class="nm">'+esc(x.n)+' '+badge+'</div>'+phone1+addr+det+'</div>';
}
document.getElementById('q').addEventListener('input',e=>{term=e.target.value;render();});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');filter=t.dataset.f;render();
});
render();
</script>
</body>
